<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم فلو أفنان | Flow-Afnan</title>
    <!-- خطوط ورموز -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            /* الألوان الأساسية - تصميم ليلي فخم */
            --bg-main: #0a0f1c;
            --bg-card: rgba(20, 27, 45, 0.7);
            --bg-sidebar: #111827;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --secondary: #8b5cf6;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 16px;
            --radius-md: 12px;
            --sidebar-width: 280px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* ================= شاشة تسجيل الدخول ================= */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .login-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px var(--primary-glow);
            transform: translateY(0);
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to left, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 15px 15px 15px 45px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* ================= لوحة التحكم ================= */
        #appContainer {
            display: none; /* مخفي حتى تسجيل الدخول */
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        /* الشريط الجانبي */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
        }

        .sidebar .logo {
            padding: 30px 20px;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to right, transparent, rgba(59, 130, 246, 0.05), transparent);
        }
        
        .sidebar .logo span { color: var(--primary); }

        .sidebar-nav { flex: 1; padding: 20px 0; overflow-y: auto; }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: var(--transition);
            border-right: 4px solid transparent;
            margin-bottom: 5px;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, transparent 100%);
            color: #fff;
            border-right-color: var(--primary);
        }

        .sidebar-nav a i {
            width: 24px;
            font-size: 18px;
            text-align: center;
            transition: var(--transition);
        }
        
        .sidebar-nav a.active i { color: var(--primary); transform: scale(1.1); }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            flex: 1;
            padding: 30px;
            transition: var(--transition);
            width: calc(100% - var(--sidebar-width));
        }

        /* أزرار وعناصر عامة */
        .btn {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4); }
        .btn-icon { padding: 8px 12px; font-size: 14px; box-shadow: none; border-radius: 8px;}

        /* الكروت والبطاقات */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header h3 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        /* النماذج والإدخال */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;}
        
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        
        input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: #fff;
            outline: none;
            transition: var(--transition);
        }
        
        input:focus, textarea:focus, select:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        /* الجداول */
        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: right; }
        
        th, td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        
        th { background: rgba(0,0,0,0.3); font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 13px; letter-spacing: 1px;}
        
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        
        .prod-img-mini { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-color); }
        
        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
            background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2);
        }

        /* التجاوب (Mobile & Tablet) */
        .menu-toggle { display: none; }
        .overlay { display: none; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; width: 100%; padding: 20px; padding-top: 80px; }
            
            /* هيدر الموبايل */
            .mobile-header {
                position: fixed; top: 0; right: 0; left: 0; height: 70px;
                background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(10px);
                border-bottom: 1px solid var(--border-color);
                display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 90;
            }
            .menu-toggle {
                display: block; background: transparent; border: none; color: white; font-size: 24px; cursor: pointer;
            }
            .mobile-logo { font-size: 20px; font-weight: 800; }
            .mobile-logo span { color: var(--primary); }

            .overlay {
                display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
                z-index: 95; opacity: 0; pointer-events: none; transition: var(--transition);
            }
            .overlay.active { opacity: 1; pointer-events: all; }
            
            .card { padding: 15px; }
            .card-header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }

        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            th, td { padding: 12px; font-size: 14px; }
            .btn { width: 100%; justify-content: center; margin-top: 10px; }
            .btn-icon { width: auto; margin-top: 0; }
        }

        /* توست (إشعارات) */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(16, 185, 129, 0.9); backdrop-filter: blur(10px); color: white;
            padding: 12px 25px; border-radius: 30px; font-weight: 600; box-shadow: 0 10px 25px rgba(16,185,129,0.3);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2000; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: rgba(239, 68, 68, 0.9); box-shadow: 0 10px 25px rgba(239,68,68,0.3); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ================= شاشة تسجيل الدخول ================= -->
    <div id="loginScreen">
        <div class="login-card">
            <h2><i class="fa-solid fa-shield-halved"></i> تسجيل الدخول</h2>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="afnan@afnanai.com">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
            </div>
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="handleLogin()">
                دخول للوحة التحكم <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            <p id="loginError" style="color: var(--danger); margin-top: 15px; font-size: 14px; display: none;">
                البيانات غير صحيحة، حاول مجدداً.
            </p>
        </div>
    </div>

    <!-- ================= التطبيق (لوحة التحكم) ================= -->
    <div id="appContainer">
        
        <!-- الهيدر للموبايل فقط -->
        <div class="mobile-header">
            <div class="mobile-logo">Flow-<span>Afnan</span></div>
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        </div>

        <!-- خلفية معتمة للموبايل -->
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <!-- الشريط الجانبي -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">Flow-<span>Afnan</span></div>
            <nav class="sidebar-nav">
                <a href="#" class="active" onclick="switchTab('products', this)"><i class="fa-solid fa-box-open"></i> إدارة المنتجات</a>
                <a href="#" onclick="switchTab('addProduct', this)"><i class="fa-solid fa-circle-plus"></i> إضافة منتج</a>
                <a href="#" onclick="switchTab('banner', this)"><i class="fa-solid fa-images"></i> إعدادات البانر</a>
                <a href="#" style="margin-top: 30px; color: var(--danger);" onclick="handleLogout()"><i class="fa-solid fa-power-off"></i> تسجيل الخروج</a>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            
            <!-- 1. صفحة المنتجات -->
            <section id="productsSection" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-boxes-stacked" style="color: var(--primary);"></i> جميع المنتجات</h3>
                        <button class="btn" onclick="document.querySelector('.sidebar-nav a:nth-child(2)').click()"><i class="fa-solid fa-plus"></i> منتج جديد</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>الصورة</th>
                                    <th>اسم المنتج</th>
                                    <th>القسم</th>
                                    <th>السعر</th>
                                    <th>الخصم</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <!-- يتم جلب البيانات هنا -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 2. صفحة إضافة/تعديل منتج -->
            <section id="addProductSection" class="tab-content hidden">
                <div class="card">
                    <div class="card-header">
                        <h3 id="formTitle"><i class="fa-solid fa-pen-to-square" style="color: var(--secondary);"></i> إضافة منتج جديد</h3>
                    </div>
                    
                    <input type="hidden" id="editId">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label>اسم المنتج *</label>
                            <input type="text" id="prodName" placeholder="مثال: سماعة بلوتوث لاسلكية" required>
                        </div>
                        <div class="form-group">
                            <label>القسم *</label>
                            <select id="prodCategory">
                                <option value="إلكترونيات">إلكترونيات</option>
                                <option value="هواتف">هواتف</option>
                                <option value="ملابس">ملابس</option>
                                <option value="منزل">منزل</option>
                                <option value="رياضة">رياضة</option>
                                <option value="ألعاب">ألعاب</option>
                                <option value="تجميل">تجميل</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>وصف المنتج</label>
                        <textarea id="prodDesc" placeholder="اكتب تفاصيل ومميزات المنتج هنا..." rows="4"></textarea>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>السعر الأساسي ($) *</label>
                            <input type="number" id="prodPrice" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group" style="display: flex; align-items: flex-end; gap: 15px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 15px;">
                                <input type="checkbox" id="prodDiscountActive" style="width: 20px; height: 20px; accent-color: var(--primary);"> تفعيل خصم
                            </label>
                            <div style="flex: 1;">
                                <label>نسبة الخصم (%)</label>
                                <input type="number" id="prodDiscountPercent" placeholder="مثال: 20" value="0" min="0" max="100">
                            </div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                        <label style="display: flex; justify-content: space-between; align-items: center;">
                            <span>صور المنتج (رابط مباشر) *</span>
                            <button type="button" class="btn btn-icon" style="padding: 5px 10px;" onclick="addImageField()"><i class="fa-solid fa-plus"></i></button>
                        </label>
                        <div id="imageInputsContainer" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                            <input type="text" class="prodImageInput" placeholder="الصورة الرئيسية 1 (إجبارية)" required>
                        </div>
                    </div>

                    <div style="text-align: left; margin-top: 30px;">
                        <button class="btn" style="padding: 12px 40px; font-size: 16px;" onclick="submitProduct()">حفظ البيانات <i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
            </section>

            <!-- 3. إعدادات البانر -->
            <section id="bannerSection" class="tab-content hidden">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-image" style="color: var(--primary);"></i> البانر الرئيسي للمتجر</h3>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>رابط صورة البانر</label>
                        <input type="text" id="bannerImage" placeholder="https://example.com/banner.jpg">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>الرابط عند النقر (اختياري)</label>
                        <input type="text" id="bannerLink" placeholder="رابط توجيه الزبون عند الضغط على البانر">
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button class="btn" onclick="saveBanner()"><i class="fa-solid fa-check"></i> حفظ الإعدادات</button>
                        <button class="btn btn-danger" onclick="deleteBanner()"><i class="fa-solid fa-trash"></i> إزالة البانر</button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- الإشعارات المنبثقة -->
    <div id="toast" class="toast"></div>

    <script>
        // ================= التوثيق الإجباري (Login Logic) =================
        const REQUIRED_EMAIL = "afnan@afnanai.com";
        const REQUIRED_PASS = "afnanai";

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const errorMsg = document.getElementById('loginError');

            if (email === REQUIRED_EMAIL && pass === REQUIRED_PASS) {
                // دخول ناجح
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                initApp(); // بدء تهيئة الفايربيس وتحميل البيانات
                showToast('تم تسجيل الدخول بنجاح', 'success');
            } else {
                // فشل الدخول
                errorMsg.style.display = 'block';
                // تأثير اهتزاز خفيف
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(10px)';
                setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(10px)', 200);
                setTimeout(() => card.style.transform = 'translateX(0)', 300);
            }
        }

        // دعم الضغط على Enter في حقل الباسورد
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        function handleLogout() {
            if(confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginPassword').value = '';
            }
        }

        // ================= تهيئة Firebase =================
        const firebaseConfig = {
            apiKey: "AIzaSyBA3w0gv38P6Ry_m3sMwXI-l-_NGuWKCUA",
            authDomain: "flow-afnan.firebaseapp.com",
            databaseURL: "https://flow-afnan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "flow-afnan",
            storageBucket: "flow-afnan.firebasestorage.app",
            messagingSenderId: "730735289702",
            appId: "1:730735289702:web:5b21d8fa380cb09e0f54a7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp() {
            loadProducts();
            loadBanner();
        }

        // ================= واجهة المستخدم (UI/UX) =================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function switchTab(tabId, element) {
            // تحديث الأزرار
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            if(element) element.classList.add('active');

            // إخفاء كل الأقسام
            document.querySelectorAll('.tab-content').forEach(sec => sec.classList.add('hidden'));
            
            // إظهار القسم المطلوب
            document.getElementById(tabId + 'Section').classList.remove('hidden');

            // إغلاق القائمة في الموبايل
            if (window.innerWidth <= 992) toggleSidebar();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type === 'error' ? 'error' : ''}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ================= إدارة المنتجات =================
        function loadProducts() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">جاري التحميل...</td></tr>';

            db.ref('products').on('value', snap => {
                const data = snap.val();
                tbody.innerHTML = '';
                
                if (data) {
                    Object.entries(data).reverse().forEach(([key, prod]) => {
                        const img = (prod.images && prod.images.length > 0) ? prod.images[0] : 'https://via.placeholder.com/50';
                        const discountHTML = prod.discountActive 
                            ? `<span class="badge">%${prod.discountPercent} خصم</span>` 
                            : '<span style="color:var(--text-muted)">لا يوجد</span>';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><img src="${img}" class="prod-img-mini" onerror="this.src='https://via.placeholder.com/50'"></td>
                            <td style="font-weight:600;">${prod.name || 'بدون اسم'}</td>
                            <td>${prod.category || 'غير محدد'}</td>
                            <td style="color:var(--success); font-weight:700;">$${prod.price || 0}</td>
                            <td>${discountHTML}</td>
                            <td>
                                <button class="btn btn-icon" onclick="editProduct('${key}')" title="تعديل"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn btn-icon btn-danger" onclick="deleteProduct('${key}')" title="حذف"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:30px;">لا توجد منتجات مضافة حالياً.</td></tr>';
                }
            });
        }

        function addImageField() {
            const container = document.getElementById('imageInputsContainer');
            const count = container.querySelectorAll('.prodImageInput').length;
            if (count < 5) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'prodImageInput';
                input.placeholder = `الصورة ${count + 1} (اختياري)`;
                container.appendChild(input);
            } else {
                showToast('الحد الأقصى 5 صور للمنتج', 'error');
            }
        }

        function submitProduct() {
            const editId = document.getElementById('editId').value;
            const name = document.getElementById('prodName').value.trim();
            const category = document.getElementById('prodCategory').value;
            const desc = document.getElementById('prodDesc').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const discountActive = document.getElementById('prodDiscountActive').checked;
            const discountPercent = parseFloat(document.getElementById('prodDiscountPercent').value) || 0;
            
            const images = Array.from(document.querySelectorAll('.prodImageInput'))
                              .map(inp => inp.value.trim())
                              .filter(url => url !== "");

            // التحقق من الحقول
            if (!name || isNaN(price) || images.length === 0) {
                showToast('يرجى ملء الاسم، السعر، ورابط صورة واحدة على الأقل', 'error');
                return;
            }

            const productData = { 
                name, category, desc, price, 
                discountActive, discountPercent, 
                images, 
                updatedAt: new Date().toISOString()
            };

            const ref = editId ? db.ref(`products/${editId}`) : db.ref('products').push();
            
            const btn = document.querySelector('#addProductSection .btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            (editId ? ref.update(productData) : ref.set(productData)).then(() => {
                showToast(editId ? 'تم تحديث المنتج بنجاح' : 'تمت إضافة المنتج بنجاح');
                resetForm();
                switchTab('products', document.querySelector('.sidebar-nav a:first-child'));
            }).catch(err => {
                showToast('حدث خطأ أثناء الحفظ', 'error');
                console.error(err);
            }).finally(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        function editProduct(key) {
            db.ref(`products/${key}`).once('value', snap => {
                const p = snap.val();
                if(!p) return;

                document.getElementById('editId').value = key;
                document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen" style="color: var(--secondary);"></i> تعديل بيانات المنتج';
                document.getElementById('prodName').value = p.name || '';
                document.getElementById('prodCategory').value = p.category || 'إلكترونيات';
                document.getElementById('prodDesc').value = p.desc || '';
                document.getElementById('prodPrice').value = p.price || '';
                document.getElementById('prodDiscountActive').checked = p.discountActive || false;
                document.getElementById('prodDiscountPercent').value = p.discountPercent || 0;
                
                const container = document.getElementById('imageInputsContainer');
                container.innerHTML = '';
                if(p.images && p.images.length > 0) {
                    p.images.forEach((img, i) => {
                        container.innerHTML += `<input type="text" class="prodImageInput" placeholder="الصورة ${i+1}" value="${img}" ${i===0?'required':''}>`;
                    });
                } else {
                    container.innerHTML = `<input type="text" class="prodImageInput" placeholder="الصورة الرئيسية 1 (إجبارية)" required>`;
                }

                // الانتقال لصفحة التعديل
                switchTab('addProduct', document.querySelector('.sidebar-nav a:nth-child(2)'));
            });
        }

        function deleteProduct(key) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')) {
                db.ref(`products/${key}`).remove()
                  .then(() => showToast('تم حذف المنتج بنجاح'))
                  .catch(() => showToast('حدث خطأ أثناء الحذف', 'error'));
            }
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-circle-plus" style="color: var(--secondary);"></i> إضافة منتج جديد';
            document.getElementById('prodName').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodDiscountActive').checked = false;
            document.getElementById('prodDiscountPercent').value = '0';
            document.getElementById('imageInputsContainer').innerHTML = '<input type="text" class="prodImageInput" placeholder="الصورة الرئيسية 1 (إجبارية)" required>';
        }

        // ================= إدارة البانر =================
        function loadBanner() {
            db.ref('banner').on('value', snap => {
                const b = snap.val();
                if (b) {
                    document.getElementById('bannerImage').value = b.imageUrl || '';
                    document.getElementById('bannerLink').value = b.linkUrl || '';
                }
            });
        }

        function saveBanner() {
            const imageUrl = document.getElementById('bannerImage').value.trim();
            const linkUrl = document.getElementById('bannerLink').value.trim();
            db.ref('banner').set({ imageUrl, linkUrl })
              .then(() => showToast('تم تحديث البانر بنجاح'))
              .catch(() => showToast('خطأ في حفظ البانر', 'error'));
        }

        function deleteBanner() {
            if (confirm('هل تريد مسح البانر من المتجر؟')) {
                db.ref('banner').remove().then(() => {
                    document.getElementById('bannerImage').value = '';
                    document.getElementById('bannerLink').value = '';
                    showToast('تمت إزالة البانر');
                });
            }
        }
    </script>
</body>
</html>
