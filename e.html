<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow-Afnan | منصة التسوق</title>
    <!-- Font Awesome & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            /* نظام ألوان عصري وأكثر عمقاً */
            --bg-main: #06090f;
            --bg-card: #111622;
            --bg-card-hover: #171d2b;
            --bg-glass: rgba(17, 22, 34, 0.85);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(59, 130, 246, 0.4);
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dark: #6b7280;
            
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.3);
            
            --success: #10b981;
            --danger: #ef4444;
            --star: #fbbf24;
            
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 20px var(--accent-glow);
            
            --trans-fast: 0.2s ease;
            --trans-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-w: 300px;
            
            /* ألوان إضافية للتصميم الفخم */
            --primary-gold: #d4af37;
            --primary-rose: #ff4a80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 90; opacity: 0; pointer-events: none; transition: var(--trans-smooth);
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        /* Header (Glassmorphism & Fixed Alignment) */
        .header {
            position: sticky; top: 0; z-index: 80;
            background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .header-logo {
            font-size: 22px; font-weight: 900; letter-spacing: -0.5px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; color: #fff;
        }
        .header-logo span { color: var(--accent); }
        .header-spacer { flex: 1; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        
        .btn-icon {
            width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border-light);
            background: var(--bg-card); color: var(--text-main); font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--trans-fast); position: relative;
        }
        .btn-icon:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow-glow); }
        
        .badge-count {
            position: absolute; top: -2px; right: -2px; background: var(--danger); color: #fff;
            font-size: 11px; font-weight: 800; min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; padding: 0 4px;
            border: 2px solid var(--bg-main);
        }

        .btn-login {
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent);
            color: var(--accent-hover); padding: 0 16px; height: 42px; border-radius: 21px;
            font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--trans-fast);
        }
        .btn-login:hover { background: var(--accent); color: #fff; box-shadow: var(--shadow-glow); }

        /* Sidebar & Profile */
        .sidebar {
            position: fixed; top: 0; right: 0; width: var(--sidebar-w); height: 100vh;
            background: var(--bg-card); z-index: 100; transform: translateX(100%);
            transition: var(--trans-smooth); display: flex; flex-direction: column;
            border-left: 1px solid var(--border-light); box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.open { transform: translateX(0); }
        
        .sidebar-profile {
            padding: 24px 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-light);
            position: relative; overflow: hidden;
        }
        .sidebar-profile::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .profile-flex { display: flex; align-items: center; gap: 14px; }
        .profile-img {
            width: 54px; height: 54px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: #fff; border: 2px solid var(--bg-main); object-fit: cover;
        }
        .profile-info { flex: 1; overflow: hidden; }
        .profile-name { font-weight: 800; font-size: 16px; color: #fff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;}
        .profile-email { font-size: 12px; color: var(--text-muted); }
        .btn-logout {
            margin-top: 12px; width: 100%; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger);
            color: var(--danger); padding: 8px; border-radius: var(--radius-sm); font-size: 13px;
            font-weight: 700; cursor: pointer; display: none; transition: var(--trans-fast);
        }
        .btn-logout:hover { background: var(--danger); color: #fff; }

        .sidebar-menu { flex: 1; overflow-y: auto; padding: 12px 0; }
        .menu-title { font-size: 12px; color: var(--text-dark); padding: 10px 20px; font-weight: 800; }
        .menu-item {
            display: flex; align-items: center; gap: 14px; padding: 12px 20px;
            color: var(--text-muted); cursor: pointer; transition: var(--trans-fast);
            border-right: 3px solid transparent; font-weight: 600;
        }
        .menu-item i { width: 20px; text-align: center; font-size: 18px; transition: var(--trans-fast); }
        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.03); color: var(--accent-hover); border-right-color: var(--accent);
        }

        /* Banner Carousel (Swipeable, Smaller height) */
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .carousel-wrapper { position: relative; margin-bottom: 30px; }
        .carousel-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 16px; padding-bottom: 10px; scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .hero-banner {
            flex: 0 0 100%; scroll-snap-align: center; position: relative;
            height: 200px; /* تم تصغير الارتفاع */
            border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-light);
            background: var(--bg-card); display: block; text-decoration: none;
        }
        @media (min-width: 768px) { .hero-banner { height: 260px; } }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .hero-banner:hover img { transform: scale(1.02); }
        .carousel-indicators {
            display: flex; justify-content: center; gap: 6px; margin-top: -5px; margin-bottom: 20px;
        }
        .dot { width: 8px; height: 8px; border-radius: 4px; background: var(--text-dark); transition: 0.3s; }
        .dot.active { width: 24px; background: var(--accent); }

        /* Section Title */
        .section-title { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .section-title i { color: var(--accent); }

        /* Product Grid */
        .product-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        @media (min-width: 600px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (min-width: 900px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        @media (min-width: 1200px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }
        
        .product-card {
            background: var(--bg-card); border-radius: var(--radius-md); border: 1px solid var(--border-light);
            overflow: hidden; cursor: pointer; transition: var(--trans-smooth);
            animation: fadeInScale 0.4s ease forwards;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--border-focus); box-shadow: var(--shadow-md); }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: rgba(0,0,0,0.2); }
        .product-info { padding: 12px; }
        .product-name { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .price { font-size: 18px; font-weight: 900; color: var(--accent-hover); }
        .price-old { text-decoration: line-through; color: var(--text-dark); font-size: 12px; }
        .rating { color: var(--star); font-size: 12px; margin-top: 4px; }

        /* Product Detail & Comments Overlay */
        .detail-panel {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 110;
            transform: translateX(100%); transition: var(--trans-smooth); display: flex; flex-direction: column;
        }
        .detail-panel.open { transform: translateX(0); }
        .detail-header {
            padding: 16px 20px; background: var(--bg-glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 16px;
            position: sticky; top: 0; z-index: 5;
        }
        .detail-content { flex: 1; overflow-y: auto; padding: 20px; }
        .detail-layout { max-width: 800px; margin: 0 auto; }
        
        .main-img-box { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-light); margin-bottom: 16px; background: #000; aspect-ratio: 1/1; }
        .main-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .thumbs-grid { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-img { width: 70px; height: 70px; border-radius: var(--radius-sm); border: 2px solid transparent; cursor: pointer; object-fit: cover; }
        .thumb-img.active { border-color: var(--accent); }

        .d-title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        .d-price { font-size: 28px; color: var(--accent-hover); font-weight: 900; margin-bottom: 16px; }
        .d-desc { color: var(--text-muted); font-size: 15px; line-height: 1.8; margin-bottom: 24px; background: var(--bg-card); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-light); }
        
        .action-row { display: flex; gap: 12px; margin-bottom: 30px; }
        .btn-main {
            flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm); font-family: inherit;
            font-size: 16px; font-weight: 800; cursor: pointer; transition: var(--trans-fast);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add-cart { background: rgba(59, 130, 246, 0.1); color: var(--accent-hover); border: 1px solid var(--accent); }
        .btn-add-cart:hover { background: var(--accent); color: #fff; }
        .btn-whatsapp { background: var(--success); color: #fff; }
        .btn-whatsapp:hover { filter: brightness(1.1); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }

        /* Comments System */
        .comments-section { border-top: 1px solid var(--border-light); padding-top: 24px; margin-top: 24px; }
        .comments-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
        .comment-card {
            background: var(--bg-card); padding: 16px; border-radius: var(--radius-md);
            margin-bottom: 12px; border: 1px solid var(--border-light); animation: slideUp 0.3s ease;
        }
        .c-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .c-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; }
        .c-name { font-weight: 700; font-size: 14px; color: #fff; }
        .c-date { font-size: 11px; color: var(--text-dark); margin-right: auto; }
        .c-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
        
        .comment-form { display: flex; gap: 10px; margin-top: 20px; }
        .comment-input {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-light); color: #fff;
            padding: 12px 16px; border-radius: var(--radius-md); font-family: inherit; resize: none;
            transition: var(--trans-fast);
        }
        .comment-input:focus { outline: none; border-color: var(--accent); }
        .btn-send { background: var(--accent); color: #fff; border: none; width: 48px; border-radius: var(--radius-md); cursor: pointer; transition: var(--trans-fast); }
        .btn-send:hover { background: var(--accent-hover); }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed; top: 0; left: 0; width: 320px; max-width: 100%; height: 100vh;
            background: var(--bg-card); z-index: 120; transform: translateX(-100%);
            transition: var(--trans-smooth); display: flex; flex-direction: column;
        }
        .cart-drawer.open { transform: translateX(0); }
        .cart-header {
            padding: 16px 20px; background: var(--bg-glass); border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
        }
        .cart-items { flex: 1; overflow-y: auto; padding: 12px 0; }
        .cart-item {
            display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-light);
            align-items: flex-start;
        }
        .cart-item img { width: 60px; height: 60px; border-radius: var(--radius-sm); object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
        .qty-controls { display: flex; gap: 6px; align-items: center; }
        .qty-btn { width: 24px; height: 24px; border: 1px solid var(--border-light); background: transparent; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .qty-btn:hover { border-color: var(--accent); }
        .cart-footer {
            padding: 16px 20px; border-top: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 12px;
        }
        .cart-total { font-size: 18px; font-weight: 900; color: var(--accent-hover); }
        .btn-checkout {
            width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
            border-radius: var(--radius-md); font-weight: 800; cursor: pointer; transition: var(--trans-fast);
        }
        .btn-checkout:hover { background: var(--accent-hover); }

        /* Toast Notification */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); color: #fff; padding: 16px 24px; border-radius: var(--radius-md);
            border: 1px solid var(--border-light); z-index: 200; transition: var(--trans-smooth);
        }
        .toast.show { bottom: 20px; }

        /* ================= نموذج تسجيل الدخول الفخم ================= */
        .login-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: var(--trans-smooth);
        }

        .login-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .login-modal-content {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-main));
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            transform: scale(0.85) translateY(30px);
            transition: var(--trans-smooth);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(212, 175, 55, 0.05) inset;
            position: relative;
        }

        .login-modal.active .login-modal-content {
            transform: scale(1) translateY(0);
        }

        .close-login-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: var(--trans-smooth);
            width: 35px; height: 35px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            border: none;
            background: transparent;
        }

        .close-login-modal:hover {
            color: var(--primary-rose);
            background: rgba(255, 74, 128, 0.1);
            transform: rotate(90deg);
        }

        .login-modal-logo {
            height: 70px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        .login-modal-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 800;
        }
        
        .login-modal-desc {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 14px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            background-color: #ffffff;
            color: #111;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--trans-smooth);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
        }

        .google-btn:hover {
            background-color: #f5f5f5;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 768px) {
            .login-modal-content { padding: 40px 25px; }
            .login-modal-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-logo" onclick="goHome()">Spaito<span>Store</span></div>
        <div class="header-spacer"></div>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleCart()"><i class="fa-solid fa-bag-shopping"></i><span class="badge-count" id="cartBadge" style="display:none;">0</span></button>
            <button class="btn-login" id="headerLoginBtn" onclick="openLogin()"><span>دخول</span></button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-profile">
            <div class="profile-flex">
                <img id="sidebarImg" class="profile-img" style="display:none;">
                <div id="sidebarAvatarIcon" class="profile-img" style="display:flex;"><i class="fa-solid fa-user"></i></div>
                <div class="profile-info">
                    <div class="profile-name" id="sidebarUserName">زائر</div>
                    <div class="profile-email" id="sidebarUserEmail">سجل الدخول للمتابعة</div>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn" onclick="signOut()">تسجيل الخروج</button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-title">التصنيفات</div>
            <div id="categoryList"></div>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Carousel -->
        <div class="carousel-wrapper">
            <div class="carousel-container" id="bannerCarousel"></div>
            <div class="carousel-indicators" id="carouselDots"></div>
        </div>

        <!-- Products -->
        <div class="section-title"><i class="fa-solid fa-star"></i> المنتجات المميزة</div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Product Detail Panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <button class="btn-icon" onclick="closeDetail()"><i class="fa-solid fa-arrow-left"></i></button>
            <span style="flex:1; text-align:center; font-weight:800;">تفاصيل المنتج</span>
        </div>
        <div class="detail-content">
            <div class="detail-layout">
                <div class="main-img-box"><img id="mainImg" src=""></div>
                <div class="thumbs-grid" id="thumbsGrid"></div>
                <h2 class="d-title" id="detailTitle"></h2>
                <div class="d-price" id="detailPrice"></div>
                <div class="d-desc" id="detailDesc"></div>
                <div class="action-row">
                    <button class="btn-main btn-add-cart" onclick="addToCart(currentProductId)"><i class="fa-solid fa-plus"></i> أضف للسلة</button>
                    <button class="btn-main btn-whatsapp" onclick="buyNow(currentProductId, parseFloat(document.getElementById('detailPrice').textContent.replace('$', '')))"><i class="fa-brands fa-whatsapp"></i> اشتري الآن</button>
                </div>
                <div class="comments-section">
                    <h3 class="comments-title">التعليقات</h3>
                    <div id="commentsList"></div>
                    <div class="comment-form">
                        <input type="text" class="comment-input" id="commentInput" placeholder="سجل الدخول للتعليق" disabled>
                        <button class="btn-send" id="commentBtn" disabled onclick="submitComment()"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                    <div id="commentLoginMsg" style="font-size:12px; color:var(--text-dark); margin-top:8px; text-align:center;">يجب تسجيل الدخول لإضافة تعليق</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <span style="flex:1; font-weight:800;">السلة</span>
            <button class="btn-icon" style="border:none;" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">الإجمالي: <span id="cartTotal">$0.00</span></div>
            <button class="btn-checkout" onclick="checkoutCart()">إتمام الشراء</button>
        </div>
    </div>

    <!-- Login Modal - نموذج تسجيل الدخول الفخم -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-content">
            <button class="close-login-modal" id="closeLoginModalBtn" onclick="closeLogin()"><i class="fa-solid fa-xmark"></i></button>
            <img src="https://i.postimg.cc/wMnkqXVg/6640.png" alt="Spaito Store Logo" class="login-modal-logo">
            <h2 class="login-modal-title">مرحباً بك في سبايتو</h2>
            <p class="login-modal-desc">سجل دخولك الآن لتتبع طلباتك والحصول على كوبونات الخصم الحصرية</p>
            
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                المتابعة باستخدام Google
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBA3w0gv38P6Ry_m3sMwXI-l-_NGuWKCUA",
            authDomain: "flow-afnan.firebaseapp.com",
            databaseURL: "https://flow-afnan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "flow-afnan",
            storageBucket: "flow-afnan.firebasestorage.app",
            messagingSenderId: "730735289702",
            appId: "1:730735289702:web:5b21d8fa380cb09e0f54a7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- Categories ---
        const categories = [
            { id: 'all', name: 'الكل', icon: 'fa-grid-2' },
            { id: 'إلكترونيات', name: 'إلكترونيات', icon: 'fa-laptop' },
            { id: 'هواتف', name: 'هواتف', icon: 'fa-mobile-screen' },
            { id: 'ملابس', name: 'ملابس', icon: 'fa-shirt' },
            { id: 'منزل', name: 'منزل', icon: 'fa-house' },
            { id: 'رياضة', name: 'رياضة', icon: 'fa-futbol' },
            { id: 'عطور', name: 'عطور وتجميل', icon: 'fa-spray-can-sparkles' }
        ];

        function renderCategories() {
            const list = document.getElementById('categoryList');
            list.innerHTML = categories.map(c => `
                <div class="menu-item ${currentCategory === c.id ? 'active' : ''}" onclick="filterCategory('${c.id}', this)">
                    <i class="fa-solid ${c.icon}"></i> ${c.name}
                </div>
            `).join('');
        }

        // --- State Variables ---
        let productsCache = [];
        let currentCategory = 'all';
        let currentUser = null;
        let currentProductId = null;
        let cart = JSON.parse(localStorage.getItem('cart_flow_afnan')) || [];

        // --- Auth System ---
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const loginBtnSpan = document.querySelector('#headerLoginBtn span');
            const cInput = document.getElementById('commentInput');
            const cBtn = document.getElementById('commentBtn');
            const cMsg = document.getElementById('commentLoginMsg');

            if (user) {
                document.getElementById('sidebarUserName').textContent = user.displayName || 'مستخدم';
                document.getElementById('sidebarUserEmail').textContent = user.email;
                if(user.photoURL) {
                    document.getElementById('sidebarImg').src = user.photoURL;
                    document.getElementById('sidebarImg').style.display = 'block';
                    document.getElementById('sidebarAvatarIcon').style.display = 'none';
                }
                document.getElementById('logoutBtn').style.display = 'block';
                loginBtnSpan.textContent = user.displayName?.split(' ')[0] || 'حسابي';
                
                // Enable Comments
                if(cInput) { cInput.disabled = false; cInput.placeholder = "اكتب تعليقك..."; }
                if(cBtn) cBtn.disabled = false;
                if(cMsg) cMsg.style.display = 'none';
            } else {
                document.getElementById('sidebarUserName').textContent = 'زائر';
                document.getElementById('sidebarUserEmail').textContent = 'سجل الدخول للمتابعة';
                document.getElementById('sidebarImg').style.display = 'none';
                document.getElementById('sidebarAvatarIcon').style.display = 'flex';
                document.getElementById('logoutBtn').style.display = 'none';
                loginBtnSpan.textContent = 'دخول';
                
                // Disable Comments
                if(cInput) { cInput.disabled = true; cInput.placeholder = "سجل الدخول للتعليق"; }
                if(cBtn) cBtn.disabled = true;
                if(cMsg) cMsg.style.display = 'block';
            }
        });

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => {
                closeLogin();
                showToast('تم تسجيل الدخول بنجاح');
            }).catch(e => showToast('حدث خطأ في تسجيل الدخول'));
        }
        
        function signOut() {
            auth.signOut().then(() => {
                closeSidebar();
                showToast('تم تسجيل الخروج');
            });
        }

        // --- Data Fetching (Banners & Products) ---
        function fetchBanners() {
            db.ref('banners').on('value', snap => {
                const data = snap.val() || {};
                const banners = Object.values(data);
                const carousel = document.getElementById('bannerCarousel');
                const dots = document.getElementById('carouselDots');
                
                carousel.innerHTML = banners.map((b, i) => `<a href="${b.link || '#'}" class="hero-banner"><img src="${b.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2321262d%22 width=%22100%22 height=%22100%22/></svg>'"></a>`).join('');
                dots.innerHTML = banners.map((_, i) => `<div class="dot ${i===0 ? 'active' : ''}"></div>`).join('');
                
                const carouselEl = document.querySelector('.carousel-container');
                let currentIndex = 0;
                setInterval(() => {
                    currentIndex = (currentIndex + 1) % banners.length;
                    carouselEl.scrollTo({ left: currentIndex * carouselEl.offsetWidth, behavior: 'smooth' });
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentIndex));
                }, 5000);
            });
        }

        function fetchProducts() {
            db.ref('products').on('value', snap => {
                const data = snap.val() || {};
                productsCache = Object.entries(data).map(([id, p]) => ({ id, ...p }));
                renderProducts();
            });
        }

        function renderProducts() {
            const filtered = currentCategory === 'all' ? productsCache : productsCache.filter(p => p.category === currentCategory);
            const grid = document.getElementById('productGrid');
            grid.innerHTML = filtered.map(p => {
                const price = p.discountActive ? p.price * (1 - p.discountPercent/100) : p.price;
                return `
                <div class="product-card" onclick="openDetail('${p.id}')">
                    <img class="product-img" src="${p.images?.[0] || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2321262d%22 width=%22100%22 height=%22100%22/></svg>'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price-row">
                            <span class="price">$${price.toFixed(2)}</span>
                            ${p.discountActive ? `<span class="price-old">$${p.price.toFixed(2)}</span>` : ''}
                        </div>
                        <div class="rating"><i class="fa-solid fa-star"></i> ${p.rating || 4.5}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function openDetail(prodId) {
            currentProductId = prodId;
            const prod = productsCache.find(p => p.id === prodId);
            if (!prod) return;

            const price = prod.discountActive ? prod.price * (1 - prod.discountPercent/100) : prod.price;
            document.getElementById('mainImg').src = prod.images?.[0] || '';
            document.getElementById('detailTitle').textContent = prod.name;
            document.getElementById('detailPrice').textContent = `$${price.toFixed(2)}`;
            document.getElementById('detailDesc').textContent = prod.description || 'منتج عالي الجودة';
            
            document.getElementById('thumbsGrid').innerHTML = (prod.images || []).map((img, i) => `
                <img class="thumb-img ${i===0 ? 'active' : ''}" src="${img}" onclick="document.getElementById('mainImg').src='${img}'; document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active')); this.classList.add('active');">
            `).join('');

            loadComments(prodId);
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

        function loadComments(prodId) {
            db.ref(`comments/${prodId}`).on('value', snap => {
                const data = snap.val() || {};
                const comments = Object.values(data);
                document.getElementById('commentsList').innerHTML = comments.map(c => `
                    <div class="comment-card">
                        <div class="c-header">
                            <div class="c-avatar">${c.name?.[0] || 'U'}</div>
                            <div class="c-name">${c.name}</div>
                            <div class="c-date">${new Date(c.timestamp).toLocaleDateString('ar-EG')}</div>
                        </div>
                        <div class="c-text">${c.text}</div>
                    </div>
                `).join('');
            });
        }

        function submitComment() {
            if (!currentUser || !document.getElementById('commentInput').value.trim()) return;
            const text = document.getElementById('commentInput').value;
            db.ref(`comments/${currentProductId}`).push({
                uid: currentUser.uid,
                name: currentUser.displayName || 'مستخدم',
                text,
                timestamp: Date.now()
            });
            document.getElementById('commentInput').value = '';
        }

        function updateCartUI() {
            let total = 0;
            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                document.getElementById('cartBadge').style.display = 'none';
                cartItems.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-muted);">السلة فارغة</div>';
                return;
            }
            document.getElementById('cartBadge').textContent = cart.length;
            document.getElementById('cartBadge').style.display = 'flex';

            cartItems.innerHTML = cart.map((item, idx) => {
                const prod = productsCache.find(p => p.id === item.id);
                if (!prod) return '';
                const price = prod.discountActive ? prod.price * (1 - prod.discountPercent/100) : prod.price;
                const line = price * item.qty;
                total += line;
                return `
                <div class="cart-item">
                    <img src="${prod.images?.[0] || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2321262d%22 width=%22100%22 height=%22100%22/></svg>'">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${prod.name}</div>
                        <div style="color:var(--accent); font-weight:800; font-size:14px; margin-bottom:8px;">$${line.toFixed(2)}</div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeCartQty(${idx},-1)">-</button>
                            <span style="font-weight:700; font-size:14px; min-width:20px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="changeCartQty(${idx},1)">+</button>
                        </div>
                    </div>
                    <button class="btn-icon" style="color:var(--danger); border-color:transparent;" onclick="removeCartItem(${idx})"><i class="fa-regular fa-trash-can"></i></button>
                </div>`;
            }).join('');
            
            document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
        }

        function addToCart(productId) {
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.qty += 1;
            else cart.push({ id: productId, qty: 1 });
            
            localStorage.setItem('cart_flow_afnan', JSON.stringify(cart));
            updateCartUI();
            showToast('تمت الإضافة للسلة بنجاح');
        }

        function changeCartQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx,1);
            localStorage.setItem('cart_flow_afnan', JSON.stringify(cart));
            updateCartUI();
        }
        
        function removeCartItem(idx) { 
            cart.splice(idx,1); 
            localStorage.setItem('cart_flow_afnan', JSON.stringify(cart)); 
            updateCartUI(); 
        }

        function checkoutCart() {
            if (cart.length === 0) { showToast('السلة فارغة'); return; }
            let msg = '🛒 *طلب جديد من Spaito Store*\n\n';
            let total = 0;
            cart.forEach(item => {
                const prod = productsCache.find(p => p.id === item.id);
                if (prod) {
                    const price = prod.discountActive ? prod.price * (1 - prod.discountPercent/100) : prod.price;
                    msg += `📦 ${prod.name} (x${item.qty}) - $${(price*item.qty).toFixed(2)}\n`;
                    total += price * item.qty;
                }
            });
            msg += `\n💰 *الإجمالي: $${total.toFixed(2)}*`;
            window.open(`https://wa.me/201015186799?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function buyNow(prodId, price) {
            const prod = productsCache.find(p => p.id === prodId);
            if (!prod) return;
            const msg = `🛍️ *طلب سريع*\n📦 ${prod.name}\n💰 السعر: $${price.toFixed(2)}`;
            window.open(`https://wa.me/201015186799?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- UI Interactions ---
        function filterCategory(cat, el) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
            closeSidebar();
        }
        
        function goHome() { 
            currentCategory = 'all'; 
            renderCategories(); 
            renderProducts(); 
            window.scrollTo({top:0, behavior:'smooth'}); 
        }
        
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.add('open'); 
            document.getElementById('overlay').classList.add('active'); 
        }
        
        function closeSidebar() { 
            document.getElementById('sidebar').classList.remove('open'); 
            document.getElementById('overlay').classList.remove('active'); 
        }
        
        function toggleCart() { 
            document.getElementById('cartDrawer').classList.toggle('open'); 
        }
        
        function openLogin() { 
            if(currentUser) { toggleSidebar(); return; }
            document.getElementById('loginModal').classList.add('active');
        }
        
        function closeLogin() { 
            document.getElementById('loginModal').classList.remove('active');
        }

        function closeAll() {
            closeSidebar();
            document.getElementById('cartDrawer').classList.remove('open');
            closeLogin();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Init
        renderCategories();
        fetchBanners();
        fetchProducts();
        updateCartUI();

    </script>
</body>
</html>
