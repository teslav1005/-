<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow-Afnan | منصة التسوق</title>
    <!-- Font Awesome & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --bg2: #111827;
            --bg3: #1a1f2e;
            --bg4: #1e2435;
            --card: #151a26;
            --card-hover: #1b2132;
            --text: #e8e9f0;
            --text2: #9ca3af;
            --text3: #6b7280;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --accent-glow: rgba(59,130,246,0.25);
            --star: #f59e0b;
            --star2: #fbbf24;
            --red: #ef4444;
            --green: #10b981;
            --border: #232839;
            --border2: #2d3348;
            --shadow: 0 2px 16px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.7);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
            --sidebar-w: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 90; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
            backdrop-filter: blur(2px);
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        .sidebar {
            position: fixed; top:0; right:0; width: var(--sidebar-w); height:100vh;
            background: var(--bg2); z-index:100; transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column; border-left:1px solid var(--border);
            overflow-y: auto; box-shadow: var(--shadow-lg);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            padding: 20px 18px; border-bottom:1px solid var(--border);
            display: flex; align-items: center; gap:12px; background: var(--bg3);
            position: sticky; top:0; z-index:5;
        }
        .sidebar-avatar {
            width:50px; height:50px; border-radius:50%;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            display:flex; align-items:center; justify-content:center;
            font-size:22px; color:#fff; flex-shrink:0;
        }
        .sidebar-user-info { flex:1; min-width:0; }
        .sidebar-user-name { font-weight:700; font-size:15px; color:#fff; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sidebar-user-email { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sidebar-close {
            background:var(--bg4); border:none; color:var(--text2); width:34px; height:34px;
            border-radius:50%; cursor:pointer; font-size:16px; transition:var(--transition);
            display:flex; align-items:center; justify-content:center;
        }
        .sidebar-close:hover { background:var(--red); color:#fff; }
        .sidebar-categories { padding:10px 0; flex:1; }
        .sidebar-cat-title {
            font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
            color:var(--text3); padding:14px 18px 6px; font-weight:700;
        }
        .sidebar-cat-item {
            display:flex; align-items:center; gap:12px; padding:13px 18px;
            cursor:pointer; transition:var(--transition); color:var(--text2);
            font-size:14px; font-weight:500; border-right:3px solid transparent;
            text-decoration:none;
        }
        .sidebar-cat-item:hover, .sidebar-cat-item.active {
            background:var(--bg3); color:#fff; border-right-color:var(--accent);
        }
        .sidebar-cat-item i { width:22px; text-align:center; font-size:15px; color:var(--accent); flex-shrink:0; }
        .sidebar-footer { padding:14px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--text3); text-align:center; background:var(--bg3); position:sticky; bottom:0; }
        /* Header */
        .header {
            position:sticky; top:0; z-index:80; background:var(--bg2); border-bottom:1px solid var(--border);
            padding:10px 14px; display:flex; align-items:center; gap:10px;
            backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            background:rgba(17,24,39,0.88);
        }
        .header-logo { font-size:20px; font-weight:900; color:#fff; letter-spacing:-0.5px; white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:6px; }
        .header-logo span { color:var(--accent); }
        .header-logo .logo-dot { width:9px; height:9px; background:var(--accent); border-radius:50%; display:inline-block; animation:pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0.7);} 50%{box-shadow:0 0 0 10px rgba(59,130,246,0);} }
        .header-spacer { flex:1; }
        .header-btn {
            background:var(--bg3); border:1px solid var(--border2); color:var(--text);
            padding:9px 15px; border-radius:25px; cursor:pointer; font-family:'Cairo',sans-serif;
            font-size:13px; font-weight:600; transition:var(--transition); display:flex; align-items:center; gap:7px;
            white-space:nowrap; text-decoration:none;
        }
        .header-btn:hover { background:var(--bg4); border-color:var(--accent); color:#fff; box-shadow:0 0 20px var(--accent-glow); }
        .header-btn.login-btn { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
        .header-btn.login-btn:hover { background:var(--accent2); box-shadow:0 0 24px rgba(59,130,246,0.45); }
        .header-btn.icon-only { width:40px; height:40px; padding:0; justify-content:center; border-radius:50%; font-size:17px; }
        .badge-dot { position:relative; }
        .badge-dot::after { content:''; position:absolute; top:6px; right:8px; width:8px; height:8px; background:var(--red); border-radius:50%; border:2px solid var(--bg2); }
        /* Hero / Banner */
        .hero {
            border-radius:var(--radius); margin-bottom:20px; position:relative; overflow:hidden;
            border:1px solid var(--border); display:flex; align-items:center; gap:20px;
            flex-wrap:wrap; min-height:140px; background: var(--bg3);
            padding:30px 24px; transition: all 0.3s;
        }
        .hero a { text-decoration:none; color:inherit; display:block; width:100%; }
        .hero img { width:100%; height:auto; max-height:300px; object-fit:cover; border-radius: var(--radius-sm); }
        .hero .placeholder-banner { font-size:50px; opacity:0.5; }
        /* Section Title */
        .section-title { display:flex; align-items:center; gap:10px; margin:20px 0 14px; font-size:18px; font-weight:800; color:#fff; }
        .section-title i { color:var(--accent); font-size:16px; }
        /* Product Grid */
        .product-grid { display:grid; grid-template-columns: repeat(2,1fr); gap:10px; }
        @media (min-width:600px) and (max-width:899px) { .product-grid { grid-template-columns: repeat(3,1fr); gap:12px; } }
        @media (min-width:900px) { .product-grid { grid-template-columns: repeat(5,1fr); gap:14px; } .main-content { padding:20px 28px; } .hero { padding:36px 32px; min-height:160px; } }
        @media (min-width:1200px) { .product-grid { gap:16px; } }
        .product-card {
            background:var(--card); border-radius:var(--radius-sm); overflow:hidden;
            cursor:pointer; transition:var(--transition); border:1px solid var(--border);
            position:relative; display:flex; flex-direction:column;
        }
        .product-card:hover { background:var(--card-hover); transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,0.5); border-color:var(--border2); }
        .product-card:active { transform:scale(0.97); }
        .product-img-wrap { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center; }
        .product-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; }
        .product-card:hover .product-img-wrap img { transform:scale(1.06); }
        .product-img-placeholder { font-size:55px; color:var(--text3); opacity:0.5; }
        .product-badge { position:absolute; top:10px; left:10px; background:var(--accent); color:#fff; font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:0.5px; z-index:2; }
        .product-info { padding:11px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
        .product-name { font-size:13px; font-weight:700; color:#fff; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .product-price { font-size:16px; font-weight:900; color:var(--accent); letter-spacing:-0.3px; }
        .old-price { text-decoration:line-through; color:var(--text3); font-size:12px; margin-right:6px; }
        .product-rating-mini { display:flex; align-items:center; gap:3px; font-size:11px; color:var(--star); }
        /* Detail Overlay */
        .detail-overlay { position:fixed; inset:0; z-index:110; background:var(--bg); transform:translateX(100%); transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; overflow-y:auto; }
        .detail-overlay.open { transform:translateX(0); }
        .detail-header { position:sticky; top:0; z-index:5; background:var(--bg2); padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
        .detail-back { background:var(--bg3); border:none; color:#fff; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:18px; transition:var(--transition); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .detail-back:hover { background:var(--bg4); color:var(--accent); }
        .detail-header-title { font-weight:700; font-size:16px; color:#fff; flex:1; text-align:center; }
        .detail-body { padding:16px; max-width:700px; margin:0 auto; width:100%; }
        .detail-img-main { width:100%; aspect-ratio:1/1; border-radius:var(--radius); overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center; margin-bottom:16px; border:1px solid var(--border); }
        .detail-img-main img { width:100%; height:100%; object-fit:cover; }
        .detail-thumbs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .detail-thumb { width:60px; height:60px; border-radius:8px; overflow:hidden; cursor:pointer; border:2px solid transparent; transition:var(--transition); }
        .detail-thumb.active { border-color:var(--accent); }
        .detail-thumb img { width:100%; height:100%; object-fit:cover; }
        .detail-name { font-size:22px; font-weight:800; color:#fff; margin-bottom:6px; }
        .detail-price { font-size:28px; font-weight:900; color:var(--accent); margin-bottom:10px; }
        .detail-desc { color:var(--text2); font-size:13px; margin-bottom:16px; line-height:1.7; }
        .detail-section-label { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .detail-section-label i { color:var(--accent); }
        .star-rating { display:flex; gap:4px; font-size:30px; cursor:pointer; margin-bottom:16px; }
        .star-rating .star { color:#3a3d4a; transition:var(--transition); }
        .star-rating .star.filled { color:var(--star2); }
        .qty-wrap { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
        .qty-btn { width:40px; height:40px; border-radius:50%; background:var(--bg3); border:2px solid var(--border2); color:#fff; font-size:20px; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; font-weight:700; }
        .qty-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
        .qty-num { font-size:22px; font-weight:800; color:#fff; min-width:35px; text-align:center; }
        .btn-primary { display:block; width:100%; padding:15px; background:var(--accent); color:#fff; border:none; border-radius:30px; font-size:16px; font-weight:800; cursor:pointer; font-family:'Cairo',sans-serif; transition:var(--transition); text-align:center; }
        .btn-primary:hover { background:var(--accent2); box-shadow:0 6px 28px rgba(59,130,246,0.5); transform:translateY(-2px); }
        .btn-cart { background:#10b981; margin-top:10px; }
        .btn-cart:hover { background:#34d399; box-shadow:0 6px 20px rgba(16,185,129,0.4); }
        /* Cart Drawer */
        .cart-drawer { position:fixed; top:0; left:0; width:320px; height:100vh; background:var(--bg2); z-index:120; transform:translateX(-100%); transition:transform 0.35s; display:flex; flex-direction:column; border-right:1px solid var(--border); }
        .cart-drawer.open { transform:translateX(0); }
        .cart-header { padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .cart-items { flex:1; overflow-y:auto; padding:10px; }
        .cart-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border2); align-items:center; }
        .cart-item img { width:50px; height:50px; border-radius:6px; object-fit:cover; }
        .cart-item-info { flex:1; }
        .cart-item-name { font-size:13px; font-weight:600; color:#fff; }
        .cart-item-price { color:var(--accent); font-size:12px; }
        .cart-item-actions { display:flex; align-items:center; gap:6px; }
        .cart-total { padding:16px; border-top:1px solid var(--border); font-weight:800; font-size:18px; }
        /* Login Modal */
        .login-modal { position:fixed; inset:0; z-index:130; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); }
        .login-modal.open { opacity:1; pointer-events:all; }
        .login-box { background:var(--bg2); border-radius:var(--radius); padding:28px 22px; width:100%; max-width:380px; border:1px solid var(--border); text-align:center; }
        .btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:13px; background:#fff; color:#1f1f1f; border:none; border-radius:28px; font-size:15px; font-weight:700; cursor:pointer; margin:15px 0; }
        .btn-close { background:transparent; border:1px solid var(--border2); color:var(--text2); padding:10px 20px; border-radius:25px; cursor:pointer; }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--bg2); color:#fff; padding:12px 22px; border-radius:30px; font-size:13px; font-weight:600; z-index:200; border:1px solid var(--border); box-shadow:var(--shadow-lg); transition:transform 0.35s; pointer-events:none; white-space:nowrap; }
        .toast.show { transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <!-- Sidebar (Menu) -->

            <button class="btn-google" id="googleLoginBtn"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/%3E%3Cpath fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24c0 3.88.95 7.54 2.56 10.78l7.97-6.19z'/%3E%3Cpath fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/%3E%3C/svg%3E" width="22"> تسجيل الدخول عبر Google</button>
            <button class="btn-close" onclick="closeLogin()">رجوع</button>

    </div>
    <div class="toast" id="toast"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBA3w0gv38P6Ry_m3sMwXI-l-_NGuWKCUA",
            authDomain: "flow-afnan.firebaseapp.com",
            databaseURL: "https://flow-afnan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "flow-afnan",
            storageBucket: "flow-afnan.firebasestorage.app",
            messagingSenderId: "730735289702",
            appId: "1:730735289702:web:5b21d8fa380cb09e0f54a7",
            measurementId: "G-90ZX8YBJ6D"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Cart state
        let cart = JSON.parse(localStorage.getItem('cart_flow_afnan')) || [];
        function saveCart() { localStorage.setItem('cart_flow_afnan', JSON.stringify(cart)); updateCartUI(); }
        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
            const cartItems = document.getElementById('cartItems');
            let total = 0;
            cartItems.innerHTML = cart.map((item, idx) => {
                const prod = productsCache.find(p => p.id === item.id);
                if (!prod) return '';
                const line = prod.price * item.qty;
                total += line;
                return `<div class="cart-item">
                    <img src="${prod.images[0]}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/></svg>'">
                    <div class="cart-item-info"><div class="cart-item-name">${prod.name}</div><div class="cart-item-price">$${line.toFixed(2)}</div></div>
                    <div class="cart-item-actions">
                        <button onclick="changeCartQty(${idx},-1)" style="background:var(--bg3);border:none;color:#fff;border-radius:50%;width:24px;height:24px;">−</button>
                        <span>${item.qty}</span>
                        <button onclick="changeCartQty(${idx},1)" style="background:var(--bg3);border:none;color:#fff;border-radius:50%;width:24px;height:24px;">+</button>
                        <button onclick="removeCartItem(${idx})" style="background:var(--red);border:none;color:#fff;border-radius:4px;padding:2px 6px;">🗑️</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').textContent = `الإجمالي: $${total.toFixed(2)}`;
        }
        function addToCart(productId, qty) {
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.qty += qty;
            else cart.push({ id: productId, qty });
            saveCart();
            showToast('تمت الإضافة للسلة');
        }
        function changeCartQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx,1);
            saveCart();
        }
        function removeCartItem(idx) { cart.splice(idx,1); saveCart(); }
        function checkoutCart() {
            if (cart.length === 0) { showToast('السلة فارغة','error'); return; }
            let msg = '🛒 *طلب جديد من Flow-Afnan*\n\n';
            let total = 0;
            cart.forEach(item => {
                const prod = productsCache.find(p => p.id === item.id);
                if (prod) {
                    msg += `📦 ${prod.name} (x${item.qty}) - $${(prod.price*item.qty).toFixed(2)}\n`;
                    total += prod.price * item.qty;
                }
            });
            msg += `\n💰 *الإجمالي: $${total.toFixed(2)}*`;
            const url = `https://wa.me/201015186799?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        // Auth
        let currentUser = null;
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('sidebarUserName').textContent = user.displayName || 'مستخدم';
                document.getElementById('sidebarUserEmail').textContent = user.email;
                document.getElementById('sidebarAvatar').innerHTML = '<i class="fa-solid fa-user-check"></i>';
                document.getElementById('headerLoginBtn').innerHTML = '<i class="fa-solid fa-user-check"></i> '+ (user.displayName?.split(' ')[0] || 'حسابي');
            } else {
                document.getElementById('sidebarUserName').textContent = 'زائر';
                document.getElementById('sidebarUserEmail').textContent = 'سجل الدخول للمتابعة';
                document.getElementById('sidebarAvatar').innerHTML = '<i class="fa-solid fa-user"></i>';
                document.getElementById('headerLoginBtn').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
            }
        });
        function openLogin() { document.getElementById('loginModal').classList.add('open'); }
        function closeLogin() { document.getElementById('loginModal').classList.remove('open'); }
        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeLogin()).catch(e => showToast(e.message,'error'));
        });

        // Products & Banner
        let productsCache = [];
        function fetchProducts() {
            db.ref('products').on('value', snap => {
                const data = snap.val();
                productsCache = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
                renderProducts(currentCategory);
            });
        }
        function fetchBanner() {
            db.ref('banner').on('value', snap => {
                const banner = snap.val();
                const container = document.getElementById('heroContainer');
                if (banner && banner.imageUrl) {
                    container.innerHTML = `<div class="hero">${banner.linkUrl ? `<a href="${banner.linkUrl}" target="_blank">` : ''}<img src="${banner.imageUrl}" style="width:100%; border-radius:var(--radius-sm);">${banner.linkUrl ? '</a>' : ''}</div>`;
                } else {
                    container.innerHTML = `<div class="hero"><div class="placeholder-banner">🛍️</div><div><h1>أهلاً بك في Flow-Afnan</h1><p>تسوق أحدث المنتجات</p></div></div>`;
                }
            });
        }

        let currentCategory = 'all';
        function renderProducts(cat) {
            const filtered = cat === 'all' ? productsCache : productsCache.filter(p => p.category === cat);
            const grid = document.getElementById('productGrid');
            const empty = document.getElementById('emptyState');
            if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            grid.innerHTML = filtered.map(p => {
                const disc = p.discountActive ? `<span class="old-price">$${p.price.toFixed(2)}</span> $${(p.price * (1 - p.discountPercent/100)).toFixed(2)}` : `$${p.price.toFixed(2)}`;
                return `<div class="product-card" onclick="openProductDetail('${p.id}')">
                    <div class="product-img-wrap"><img src="${p.images?.[0] || ''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="product-img-placeholder" style="display:none;"><i class="fa-solid fa-image"></i></div></div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${disc}</div>
                        <div class="product-rating-mini">${'★'.repeat(Math.round(p.rating||4))}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function openProductDetail(productId) {
            const prod = productsCache.find(p => p.id === productId);
            if (!prod) return;
            const discPrice = prod.discountActive ? prod.price * (1 - prod.discountPercent/100) : prod.price;
            const imgs = prod.images || [];
            document.getElementById('detailBody').innerHTML = `
                <div class="detail-img-main"><img src="${imgs[0] || ''}" id="detailMainImg"></div>
                ${imgs.length>1 ? `<div class="detail-thumbs">${imgs.map((img,i) => `<div class="detail-thumb ${i===0?'active':''}" onclick="document.getElementById('detailMainImg').src='${img}';document.querySelectorAll('.detail-thumb').forEach(t=>t.classList.remove('active'));event.currentTarget.classList.add('active')"><img src="${img}"></div>`).join('')}</div>` : ''}
                <div class="detail-name">${prod.name}</div>
                <div class="detail-price">${prod.discountActive ? `<span class="old-price">$${prod.price.toFixed(2)}</span> $${discPrice.toFixed(2)}` : `$${prod.price.toFixed(2)}`}</div>
                <div class="detail-desc">${prod.desc || ''}</div>
                <div class="detail-section-label"><i class="fa-solid fa-cubes"></i> الكمية</div>
                <div class="qty-wrap"><button class="qty-btn" onclick="changeDetailQty(-1)">−</button><span class="qty-num" id="qtyNum">1</span><button class="qty-btn" onclick="changeDetailQty(1)">+</button></div>
                <button class="btn-primary btn-cart" onclick="addToCart('${prod.id}', parseInt(document.getElementById('qtyNum').textContent))"><i class="fa-solid fa-cart-plus"></i> أضف للسلة</button>
                <button class="btn-primary" style="margin-top:10px;" onclick="buyNow('${prod.id}')">💬 شراء سريع واتساب</button>
            `;
            document.getElementById('detailOverlay').classList.add('open');
            window.currentDetailQty = 1;
        }
        function changeDetailQty(delta) { window.currentDetailQty = Math.max(1, Math.min(10, window.currentDetailQty + delta)); document.getElementById('qtyNum').textContent = window.currentDetailQty; }
        function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }
        function buyNow(prodId) {
            const prod = productsCache.find(p => p.id === prodId);
            if (!prod) return;
            const qty = parseInt(document.getElementById('qtyNum').textContent);
            const discPrice = prod.discountActive ? prod.price * (1 - prod.discountPercent/100) : prod.price;
            const total = discPrice * qty;
            const msg = `🛍️ *طلب سريع*\n📦 ${prod.name}\n💰 السعر: $${discPrice.toFixed(2)} x ${qty} = $${total.toFixed(2)}`;
            window.open(`https://wa.me/201015186799?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterCategory(cat, el) {
            document.querySelectorAll('.sidebar-cat-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            currentCategory = cat;
            renderProducts(cat);
            closeSidebar();
        }
        function goHome() { currentCategory = 'all'; renderProducts('all'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('open'); }
        function showToast(msg,type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(()=>t.classList.remove('show'),2500); }

        fetchProducts();
        fetchBanner();
        updateCartUI();
    </script>
</body>
</html>
